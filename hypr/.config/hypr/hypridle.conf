general {
    lock_cmd = pidof hyprlock || hyprlock   # lock if not already locked
    before_sleep_cmd = hyprlock             # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen back on after wake
}

listener {
    timeout = 300                           # 5 min: lock screen
    on-timeout = hyprlock
}

listener {
    timeout = 360                           # 6 min: turn off display
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 1800                          # 30 min: suspend
    on-timeout = systemctl suspend
}
