# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/Wallpapers/firewatch.jpg
    blur_passes = 2
    contrast = 0.95
    brightness = 0.72
    vibrancy = 0.08
    vibrancy_darkness = 0.0
}

# Time-Hour (24-hour format)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H")</span>"
    color = rgba(250, 250, 250, 1)
    font_size = 125
    font_family = StretchPro
    position = -80, 190
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = rgba(249, 115, 22, 1)
    font_size = 125
    font_family = StretchPro
    position = 0, 60
    halign = center
    valign = center
}

# Day-Month-Date (DD, Month, YYYY)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d, %B, %Y")"
    color = rgba(160, 160, 160, 1)
    font_size = 22
    font_family = 'Suisse Int\'l Mono'
    position = 20, -40
    halign = center
    valign = center
}

# USER

label {
    monitor =
    text =     Justin
    color = rgba(250, 250, 250, 0.86)
    font_size = 22
    font_family = SF Pro Display Bold
    position = 0, -220
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(249, 115, 22, 0.7)
    inner_color = rgba(21, 21, 21, 0.82)
    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##a0a0a0">Enter Pass</span></i>
    hide_input = false
    position = 0, -290
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/songdetail.sh)"
    color = rgba(160, 160, 160, 1)
    font_size = 18
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 40
    halign = center
    valign = bottom
}
